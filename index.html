<script>
        // 1. Seu link do Apps Script (Inalterado)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQhGsF8_GJztqLiGldJJsEsvbga5yMJEabrj-_wZ6GHCfq2ojxAo_zgCtA311XYiPDtw/exec';
        
        let dadosTerca = { prot: 0, cal: 0, water: 0, refeicoes: [] };
        const metas = { prot: 138, cal: 2200, water: 3000 };

        window.onload = function() {
            carregarDadosNuvem();
        };

        function alternarCampos() {
            const tipo = document.getElementById('tipo-registro').value;
            document.getElementById('campos-refeicao').style.display = tipo === 'refeicao' ? 'block' : 'none';
            document.getElementById('grupo-nome').style.display = tipo === 'refeicao' ? 'flex' : 'none';
            document.getElementById('campos-agua').style.display = tipo === 'agua' ? 'block' : 'none';
        }

        function adicionarItem() {
            const tipo = document.getElementById('tipo-registro').value;
            let itemParaEnviar = { dia: "Terça", tipo: tipo, nome: "-", prot: 0, cal: 0, water: 0 };

            if (tipo === 'refeicao') {
                const nome = document.getElementById('nome-refeicao').value || 'Refeição';
                const p = parseInt(document.getElementById('input-prot').value) || 0;
                const c = parseInt(document.getElementById('input-cal').value) || 0;
                if (p === 0 && c === 0) return;

                itemParaEnviar.nome = nome;
                itemParaEnviar.prot = p;
                itemParaEnviar.cal = c;
            } else {
                const ml = parseInt(document.getElementById('input-agua').value) || 0;
                if (ml <= 0) return;
                itemParaEnviar.water = ml;
            }

            document.getElementById('status-nuvem').innerText = "⏳ Salvando dados no Google Sheets...";

            // CORREÇÃO AQUI: Adicionado mode: 'no-cors' para destravar o celular
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(itemParaEnviar)
            })
            .then(() => {
                document.getElementById('status-nuvem').innerText = "✅ Salvo com sucesso!";
                document.getElementById('nome-refeicao').value = '';
                document.getElementById('input-prot').value = '';
                document.getElementById('input-cal').value = '';
                document.getElementById('input-agua').value = '';
                
                // Aguarda 2 segundos para o Google processar na planilha e atualiza a tela
                setTimeout(carregarDadosNuvem, 2000);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-nuvem').innerText = "❌ Erro ao salvar dados.";
            });
        }

        function carregarDadosNuvem() {
            document.getElementById('status-nuvem').innerText = "🔄 Sincronizando com o Google Sheets...";
            
            // CORREÇÃO AQUI: Agora lê usando o próprio Apps Script (doGet), sem depender de variáveis extras
            fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(rows => {
                dadosTerca = { prot: 0, cal: 0, water: 0, refeicoes: [] };

                rows.forEach(row => {
                    // Garante que estamos lendo apenas os lançamentos cadastrados como Terça
                    if (row.dia === "Terça") {
                        if (row.tipo === "refeicao") {
                            dadosTerca.prot += parseInt(row.prot) || 0;
                            dadosTerca.cal += parseInt(row.cal) || 0;
                            dadosTerca.refeicoes.push({ nome: row.nome, prot: parseInt(row.prot) || 0, cal: parseInt(row.cal) || 0 });
                        } else if (row.tipo === "agua") {
                            dadosTerca.water += parseInt(row.water) || 0;
                        }
                    }
                });

                atualizarPainelTerca();
                document.getElementById('status-nuvem').innerText = "✅ Sincronizado com Google Sheets";
            })
            .catch(err => {
                document.getElementById('status-nuvem').innerText = "❌ Erro ao carregar dados salvos.";
                console.error(err);
            });
        }

        function atualizarPainelTerca() {
            const pctProt = Math.min(Math.round((dadosTerca.prot / metas.prot) * 100), 100);
            const pctCal = Math.min(Math.round((dadosTerca.cal / metas.cal) * 100), 100);
            const pctWater = Math.min(Math.round((dadosTerca.water / metas.water) * 100), 100);

            document.getElementById('label-prot-terca').innerText = `${dadosTerca.prot}g / ${metas.prot}g (${pctProt}%)`;
            document.getElementById('label-cal-terca').innerText = `${dadosTerca.cal} kcal / ${metas.cal} kcal (${pctCal}%)`;
            document.getElementById('label-water-terca').innerText = `${(dadosTerca.water / 1000).toFixed(1)}L / 3.0L (${pctWater}%)`;

            document.getElementById('bar-prot-terca').style.width = pctProt + '%';
            document.getElementById('bar-cal-terca').style.width = pctCal + '%';
            document.getElementById('bar-water-terca').style.width = pctWater + '%';

            const lista = document.getElementById('lista-refeicoes-terca');
            if (dadosTerca.refeicoes.length > 0) {
                lista.style.display = 'block';
                lista.innerHTML = '';
                dadosTerca.refeicoes.forEach(item => {
                    lista.innerHTML += `<div class="meal-item"><span><b>${item.nome}:</b> ${item.prot}g P | ${item.cal} kcal</span></div>`;
                });
            } else {
                lista.style.display = 'none';
            }
        }
    </script>
