<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Monitor + IA</title>
    <style>
        /* Mantém o seu estilo original abaixo e adiciona estes para a IA */
        .box-ia {
            background: #fff0f5;
            border: 2px dashed #ff69b4;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .btn-ia {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-ia:disabled { background-color: #ccc; }
        #resultado-ia { margin-top: 10px; font-size: 14px; color: #333; text-align: left; }
    </style>
</head>
<body>

    <div class="box-ia">
        <h3>🤖 Analisar Prato com IA</h3>
        <p style="font-size: 12px; color: #666;">Tire uma foto ou envie uma imagem do seu prato</p>
        <input type="file" id="foto-refeicao" accept="image/*">
        <button class="btn-ia" id="btn-analisar" onclick="analisarPratoComIA()">🔍 Analisar com Gemini IA</button>
        <div id="resultado-ia"></div>
    </div>

    <div id="status-nuvem">🔄 Carregando dados...</div>
    <div id="lista-refeicoes-terca"></div>

    <script>
        // 1. LINK DO SEU APPS SCRIPT
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQhGsF8_GJztqLiGldJJsEsvbga5yMJEabrj-_wZ6GHCfq2ojxAo_zgCtA311XYiPDtw/exec';
                
        // 2. ID DA SUA PLANILHA GOOGLE
        const SCRIPT_ID = '1IQ4lgm2ddNbx4lFYRcAsu9eugq6_LhrwuY7fCiNYVr4';

        // 3. SUA CHAVE DA API DO GEMINI (Gere uma grátis no Google AI Studio)
        const GEMINI_API_KEY = 'SUA_CHAVE_GEMINI_AQUI';

        let dadosTerca = { prot: 0, cal: 0, water: 0, refeicoes: [] };
        const metas = { prot: 138, cal: 2200, water: 3000 };

        window.onload = function() {
            carregarDadosNuvem();
        };

        // --- FUNÇÃO NOVA: CONFIGURAÇÃO DA IA ---
        async function analisarPratoComIA() {
            const arquivoInput = document.getElementById('foto-refeicao');
            const resultadoDiv = document.getElementById('resultado-ia');
            const btn = document.getElementById('btn-analisar');

            if (!arquivoInput.files || arquivoInput.files.length === 0) {
                alert('Por favor, selecione ou tire uma foto primeiro!');
                return;
            }

            if (GEMINI_API_KEY === 'SUA_CHAVE_GEMINI_AQUI') {
                alert('Você precisa colocar sua chave API do Gemini no código!');
                return;
            }

            const arquivo = arquivoInput.files[0];
            resultadoDiv.innerHTML = "⏳ IA analisando a imagem... Aguarde.";
            btn.disabled = true;

            try {
                // Converte a imagem para Base64 para enviar à API
                const reader = new FileReader();
                reader.readAsDataURL(arquivo);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const mimeType = arquivo.type;

                    // Monta a requisição para o modelo Gemini 1.5 Flash (ideal para imagens)
                    const urlGemini = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                    
                    const dadosEnvio = {
                        contents: [{
                            parts: [
                                { text: "Analise esta imagem de comida. Estime as proteínas em gramas (apenas o número inteiro) e as calorias em kcal (apenas o número inteiro). Dê um nome curto para o prato. Retorne estritamente um JSON no seguinte formato, sem formatação markdown extra: {\"nome\": \"Nome do Prato\", \"prot\": 30, \"cal\": 450}" },
                                { inlineData: { mimeType: mimeType, data: base64Data } }
                            ]
                        }]
                    };

                    const resposta = await fetch(urlGemini, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dadosEnvio)
                    });

                    const jsonResposta = await resposta.json();
                    let textoResultado = jsonResposta.candidates[0].content.parts[0].text;
                    
                    // Limpa possíveis marcações de código markdown que a IA coloque
                    textoResultado = textoResultado.replace(/```json/g, '').replace(/```/g, '').trim();
                    const dadosComida = JSON.parse(textoResultado);

                    resultadoDiv.innerHTML = `
                        <div style="border: 1px solid #ff69b4; padding: 10px; border-radius: 5px; background: #fff;">
                            <b>Prato identificado:</b> ${dadosComida.nome}<br>
                            <b>Proteínas estimadas:</b> ${dadosComida.prot}g<br>
                            <b>Calorias estimadas:</b> ${dadosComida.cal} kcal<br>
                            <button class="btn-ia" style="background:#28a745; margin-top:5px;" onclick="salvarRefeicaoIA('${dadosComida.nome}', ${dadosComida.prot}, ${dadosComida.cal})">✅ Confirmar e Salvar no Sheets</button>
                        </div>
                    `;
                    btn.disabled = false;
                };
            } catch (erro) {
                console.error(erro);
                resultadoDiv.innerHTML = "❌ Erro ao analisar a imagem com a IA.";
                btn.disabled = false;
            }
        }

        // --- FUNÇÃO NOVA: SALVA O RESULTADO DA IA DIRETO NO SEU GOOGLE SHEETS ---
        function salvarRefeicaoIA(nome, prot, cal) {
            document.getElementById('status-nuvem').innerText = "⏳ Salvando dados da IA no Google Sheets...";
            
            let itemParaEnviar = { 
                dia: "Terça", 
                tipo: "refeicao", 
                nome: nome, 
                prot: parseInt(prot), 
                cal: parseInt(cal), 
                water: 0 
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(itemParaEnviar)
            })
            .then(() => {
                document.getElementById('resultado-ia').innerHTML = "✅ Salvo com sucesso!";
                setTimeout(carregarDadosNuvem, 1500);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-nuvem').innerText = "❌ Erro ao salvar dados.";
            });
        }

        // --- SUAS FUNÇÕES ORIGINAIS DE LEITURA E ATUALIZAÇÃO QUE COMPROVAMOS QUE FUNCIONAM ---
        function alternarCampos() {
            const tipo = document.getElementById('tipo-registro').value;
            document.getElementById('campos-refeicao').style.display = tipo === 'refeicao' ? 'block' : 'none';
            document.getElementById('grupo-nome').style.display = tipo === 'refeicao' ? 'flex' : 'none';
            document.getElementById('campos-agua').style.display = tipo === 'agua' ? 'block' : 'none';
        }

        function adicionarItem() {
            const tipo = document.getElementById('tipo-registro').value;
            let itemParaEnviar = { dia: "Terça", tipo: tipo, nome: "-", prot: 0, cal: 0, water: 0 };

            if (tipo === 'refeicao') {
                const nome = document.getElementById('nome-refeicao').value || 'Refeição';
                const p = parseInt(document.getElementById('input-prot').value) || 0;
                const c = parseInt(document.getElementById('input-cal').value) || 0;
                if (p === 0 && c === 0) return;

                itemParaEnviar.nome = nome;
                itemParaEnviar.prot = p;
                itemParaEnviar.cal = c;
            } else {
                const ml = parseInt(document.getElementById('input-agua').value) || 0;
                if (ml <= 0) return;
                itemParaEnviar.water = ml;
            }

            document.getElementById('status-nuvem').innerText = "⏳ Salvando dados no Google Sheets...";

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(itemParaEnviar)
            })
            .then(() => {
                document.getElementById('nome-refeicao').value = '';
                document.getElementById('input-prot').value = '';
                document.getElementById('input-cal').value = '';
                document.getElementById('input-agua').value = '';
                setTimeout(carregarDadosNuvem, 1500);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-nuvem').innerText = "❌ Erro ao salvar dados.";
            });
        }

        function carregarDadosNuvem() {
            const urlLeitura = `https://docs.google.com/spreadsheets/d/${SCRIPT_ID}/gviz/tq?tqx=out:json`;

            fetch(urlLeitura)
            .then(res => res.text())
            .then(data => {
                const jsonString = data.substring(47, data.length - 2);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                dadosTerca = { prot: 0, cal: 0, water: 0, refeicoes: [] };

                rows.forEach(row => {
                    if(!row.c) return;
                    const dia = row.c[1] ? row.c[1].v : '';
                    const tipo = row.c[2] ? row.c[2].v : '';
                    const nome = row.c[3] ? row.c[3].v : '-';
                    const prot = row.c[4] ? parseInt(row.c[4].v) || 0 : 0;
                    const cal = row.c[5] ? parseInt(row.c[5].v) || 0 : 0;
                    const water = row.c[6] ? parseInt(row.c[6].v) || 0 : 0;

                    if (dia === "Terça") {
                        if (tipo === "refeicao") {
                            dadosTerca.prot += prot;
                            dadosTerca.cal += cal;
                            dadosTerca.refeicoes.push({ nome: nome, prot: prot, cal: cal });
                        } else {
                            dadosTerca.water += water;
                        }
                    }
                });

                atualizarPainelTerca();
                document.getElementById('status-nuvem').innerText = "✅ Sincronizado com Google Sheets";
            })
            .catch(err => {
                document.getElementById('status-nuvem').innerText = "❌ Erro ao carregar dados salvos.";
                console.error(err);
            });
        }

        function atualizarPainelTerca() {
            const pctProt = Math.min(Math.round((dadosTerca.prot / metas.prot) * 100), 100);
            const pctCal = Math.min(Math.round((dadosTerca.cal / metas.cal) * 100), 100);
            const pctWater = Math.min(Math.round((dadosTerca.water / metas.water) * 100), 100);

            document.getElementById('label-prot-terca').innerText = `${dadosTerca.prot}g / ${metas.prot}g (${pctProt}%)`;
            document.getElementById('label-cal-terca').innerText = `${dadosTerca.cal} kcal / ${metas.cal} kcal (${pctCal}%)`;
            document.getElementById('label-water-terca').innerText = `${(dadosTerca.water / 1000).toFixed(1)}L / 3.0L (${pctWater}%)`;

            if(document.getElementById('bar-prot-terca')) document.getElementById('bar-prot-terca').style.width = pctProt + '%';
            if(document.getElementById('bar-cal-terca')) document.getElementById('bar-cal-terca').style.width = pctCal + '%';
            if(document.getElementById('bar-water-terca')) document.getElementById('bar-water-terca').style.width = pctWater + '%';

            const lista = document.getElementById('lista-refeicoes-terca');
            if (lista) {
                if (dadosTerca.refeicoes.length > 0) {
                    lista.style.display = 'block';
                    lista.innerHTML = '';
                    dadosTerca.refeicoes.forEach(item => {
                        lista.innerHTML += `<div class="meal-item"><span><b>${item.nome}:</b> ${item.prot}g P | ${item.cal} kcal</span></div>`;
                    });
                } else {
                    lista.style.display = 'none';
                }
            }
        }
    </script>
</body>
