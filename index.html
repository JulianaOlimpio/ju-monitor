<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Monitor - Calendário Bulking</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #fdfbfd;
            --card-empty: #f5f2f4;
            --primary: #ff66a3;
            --primary-light: #ffb3d1;
            --text: #2d1f27;
            --text-support: #705362;
            --border-color: #f0e6ec;
            --accent-blue: #5bc0de;
            --accent-orange: #f0ad4e;
            --accent-green: #28a745;
        }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f4f6;
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-color);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .avatar-moderno {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffb3d1 100%);
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 102, 163, 0.2);
        }
        .avatar-moderno svg {
            width: 38px;
            height: 38px;
            fill: var(--primary);
        }
        header h1 {
            font-size: 22px;
            margin: 0;
            color: var(--text);
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-support);
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        /* SELETOR DE DIAS */
        .nav-dias {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Firefox */
        }
        .nav-dias::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .btn-dia {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-support);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .btn-dia.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* BOTÃO DE METAS */
        .btn-metas {
            background: #fff0f5;
            border: 1px dashed var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .calendar-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .day-card {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 4px 12px rgba(225, 213, 220, 0.2);
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }
        .day-title {
            font-weight: bold;
            font-size: 15px;
            color: var(--text);
        }
        .day-badge {
            color: #fff;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
        .macro-row {
            margin-bottom: 8px;
        }
        .macro-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 3px;
            font-weight: 500;
        }
        .bar-bg {
            background: #eeeaf0;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 6px;
            width: 0%;
            transition: width 0.4s ease;
        }
        .fill-prot { background: var(--primary); }
        .fill-cal { background: var(--accent-orange); }
        .fill-water { background: var(--accent-blue); }
        
        .meal-list {
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-support);
            background: #fff;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .meal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px dotted #f3f0f2;
        }
        .meal-item:last-child { border: none; }

        .form-upload {
            background: #fff;
            border: 1px solid var(--primary-light);
            border-radius: 18px;
            padding: 15px;
            margin-top: -5px;
            margin-bottom: 20px;
            box-shadow: 0 6px 15px rgba(255, 102, 163, 0.05);
        }
        .form-upload h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--primary);
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 11px;
            color: var(--text-support);
            font-weight: 600;
        }
        .input-group input, .input-group select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 12px;
            background: #faf8fa;
            color: var(--text);
            box-sizing: border-box;
        }
        .btn-submit {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            margin-top: 5px;
        }
        .btn-pdf {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
            width: 100%;
            padding: 10px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        #status-nuvem {
            text-align: center;
            font-size: 11px;
            color: var(--accent-blue);
            margin-bottom: 10px;
            font-weight: bold;
        }
        .box-ia {
            background: #fff0f5;
            border: 2px dashed var(--primary);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(255, 102, 163, 0.05);
        }
        .box-ia h3 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--primary);
        }
        .btn-ia {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            font-size: 13px;
        }
        .btn-ia:disabled { background-color: #ccc; }
        #resultado-ia { margin-top: 10px; font-size: 12px; color: #333; text-align: left; }

        @media print {
            body { background: #fff; padding: 0; }
            .container { box-shadow: none; max-width: 100%; width: 100%; padding: 0; }
            .form-upload, .box-ia, .btn-pdf, .avatar-moderno, #status-nuvem, .nav-dias, .btn-metas { display: none !important; }
            .day-card { page-break-inside: avoid; border: 1px solid #ccc !important; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="avatar-moderno">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2A3,3 0 0,1 15,5A3,3 0 0,1 12,8A3,3 0 0,1 9,5A3,3 0 0,1 12,2M11,22V15H8V11C8,9.9 8.9,9 10,9H14C15.1,9 16,9.9 16,11V15H13V22H11M6,12V9H4V12A2,2 0 0,0 6,14V12M18,12V14A2,2 0 0,0 20,12V9H18V12Z" />
                </svg>
            </div>
            <h1>Ju Monitor</h1>
        </header>
        <div class="subtitle">Semana 01: Bulking 🌸</div>
        
        <div id="status-nuvem">🔄 Sincronizando com o Google Sheets...</div>

        <button class="btn-pdf" onclick="window.print()">
            📄 Exportar Relatório Diário (PDF)
        </button>

        <!-- NOVO SELETOR DE DIAS DA SEMANA -->
        <div class="nav-dias" id="barra-dias">
            <button class="btn-dia" id="btn-Domingo" onclick="mudarDiaExibido('Domingo')">Dom</button>
            <button class="btn-dia" id="btn-Segunda" onclick="mudarDiaExibido('Segunda')">Seg</button>
            <button class="btn-dia" id="btn-Terça" onclick="mudarDiaExibido('Terça')">Ter</button>
            <button class="btn-dia" id="btn-Quarta" onclick="mudarDiaExibido('Quarta')">Qua</button>
            <button class="btn-dia" id="btn-Quinta" onclick="mudarDiaExibido('Quinta')">Qui</button>
            <button class="btn-dia" id="btn-Sexta" onclick="mudarDiaExibido('Sexta')">Sex</button>
            <button class="btn-dia" id="btn-Sábado" onclick="mudarDiaExibido('Sábado')">Sáb</button>
        </div>

        <!-- NOVO BOTÃO DE EXIBIR OBJETIVO MÁXIMO -->
        <button class="btn-metas" onclick="alert('🎯 Seus Objetivos de Bulking:\n\n• Proteína: 138g\n• Calorias: 2200 kcal\n• Água: 3.0 Litros (3000ml)')">
            🎯 Ver Macros do Objetivo Total
        </button>

        <div class="calendar-grid">
            
            <!-- PAINEL DINÂMICO INTERATIVO -->
            <div class="day-card" id="painel-principal">
                <div class="day-header">
                    <span class="day-title" id="nome-dia-titulo">Carregando...</span>
                    <span class="day-badge" id="tag-hoje" style="background: var(--accent-green); display: none;">HOJE</span>
                </div>
                <div class="macro-row">
                    <div class="macro-info"><span>Proteína</span><span id="label-prot">0g / 138g (0%)</span></div>
                    <div class="bar-bg"><div id="bar-prot" class="bar-fill fill-prot" style="width: 0%;"></div></div>
                </div>
                <div class="macro-row">
                    <div class="macro-info"><span>Calorias</span><span id="label-cal">0 kcal / 2200 kcal (0%)</span></div>
                    <div class="bar-bg"><div id="bar-cal" class="bar-fill fill-cal" style="width: 0%;"></div></div>
                </div>
                <div class="macro-row">
                    <div class="macro-info"><span>Água</span><span id="label-water">0L / 3.0L (0%)</span></div>
                    <div class="bar-bg"><div id="bar-water" class="bar-fill fill-water" style="width: 0%;"></div></div>
                </div>
                <div class="meal-list" id="lista-refeicoes" style="display:none;"></div>
            </div>

            <!-- ANÁLISE POR FOTO COM IA -->
            <div class="box-ia">
                <h3>🤖 Analisar Prato com IA</h3>
                <p style="font-size: 11px; color: #666; margin: 0 0 10px 0;">Tire uma foto ou envie uma imagem do seu prato</p>
                <input type="file" id="foto-refeicao" accept="image/*" style="font-size: 12px; width: 100%;">
                <button class="btn-ia" id="btn-analisar" onclick="analisarPratoComIA()">🔍 Analisar com Gemini IA</button>
                <div id="resultado-ia"></div>
            </div>

            <!-- FORMULÁRIO DE LANÇAMENTO (Lança sempre para o dia selecionado!) -->
            <div class="form-upload">
                <h3 id="form-title">🍱 Registrar para <span id="dia-registro-label">Hoje</span></h3>
                <div class="input-row">
                    <div class="input-group">
                        <label>Tipo de Registro</label>
                        <select id="tipo-registro" onchange="alternarCampos()">
                            <option value="refeicao">🍱 Refeição</option>
                            <option value="agua">💧 Apenas Água</option>
                        </select>
                    </div>
                    <div class="input-group" id="grupo-nome">
                        <label>Nome da Refeição</label>
                        <input type="text" id="nome-refeicao" placeholder="Ex: Almoço">
                    </div>
                </div>
                <div id="campos-refeicao">
                    <div class="input-row">
                        <div class="input-group">
                            <label>Proteína (g)</label>
                            <input type="number" id="input-prot" placeholder="g">
                        </div>
                        <div class="input-group">
                            <label>Calorias (kcal)</label>
                            <input type="number" id="input-cal" placeholder="kcal">
                        </div>
                    </div>
                </div>
                <div id="campos-agua" style="display: none; margin-bottom: 12px;">
                    <div class="input-group">
                        <label>Quantidade de Água (ml)</label>
                        <input type="number" id="input-agua" placeholder="Ex: 500">
                    </div>
                </div>
                <button class="btn-submit" id="btn-salvar" onclick="adicionarItem()">Lançar na Nuvem</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQhGsF8_GJztqLiGldJJsEsvbga5yMJEabrj-_wZ6GHCfq2ojxAo_zgCtA311XYiPDtw/exec';
        const SCRIPT_ID = '1IQ4lgm2ddNbx4lFYRcAsu9eugq6_LhrwuY7fCiNYVr4';
        const GEMINI_API_KEY = 'SUA_CHAVE_GEMINI_AQUI';

        const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
        const realDiaHoje = diasSemana[new Date().getDay()]; // O dia real de hoje no calendário
        
        let diaSelecionado = realDiaHoje; // Começa exibindo o dia de hoje
        let bancoDadosCompleto = []; // Vai guardar todas as linhas vindas da planilha

        const metas = { prot: 138, cal: 2200, water: 3000 };

        window.onload = function() {
            carregarDadosNuvem();
        };

        function mudarDiaExibido(dia) {
            diaSelecionado = dia;
            
            // Atualiza os botões visuais
            diasSemana.forEach(d => {
                const btn = document.getElementById(`btn-${d}`);
                if(btn) btn.classList.remove('active');
            });
            document.getElementById(`btn-${dia}`).classList.add('active');

            // Atualiza o formulário de inserção para o dia selecionado
            document.getElementById('dia-registro-label').innerText = dia === realDiaHoje ? "Hoje" : dia;

            // Processa novamente os dados locais para o dia escolhido
            processarEExibirDados();
        }

        function alternarCampos() {
            const tipo = document.getElementById('tipo-registro').value;
            document.getElementById('campos-refeicao').style.display = tipo === 'refeicao' ? 'block' : 'none';
            document.getElementById('grupo-nome').style.display = tipo === 'refeicao' ? 'flex' : 'none';
            document.getElementById('campos-agua').style.display = tipo === 'agua' ? 'block' : 'none';
        }

        function adicionarItem() {
            const tipo = document.getElementById('tipo-registro').value;
            let itemParaEnviar = { dia: diaSelecionado, tipo: tipo, nome: "-", prot: 0, cal: 0, water: 0 };

            if (tipo === 'refeicao') {
                const nome = document.getElementById('nome-refeicao').value || 'Refeição';
                const p = parseInt(document.getElementById('input-prot').value) || 0;
                const c = parseInt(document.getElementById('input-cal').value) || 0;
                if (p === 0 && c === 0) return;

                itemParaEnviar.nome = nome;
                itemParaEnviar.prot = p;
                itemParaEnviar.cal = c;
            } else {
                const ml = parseInt(document.getElementById('input-agua').value) || 0;
                if (ml <= 0) return;
                itemParaEnviar.water = ml;
            }

            document.getElementById('status-nuvem').innerText = "⏳ Salvando dados no Google Sheets...";

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(itemParaEnviar)
            })
            .then(() => {
                document.getElementById('nome-refeicao').value = '';
                document.getElementById('input-prot').value = '';
                document.getElementById('input-cal').value = '';
                document.getElementById('input-agua').value = '';
                setTimeout(carregarDadosNuvem, 1500);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-nuvem').innerText = "❌ Erro ao salvar dados.";
            });
        }

        function carregarDadosNuvem() {
            const urlLeitura = `https://docs.google.com/spreadsheets/d/${SCRIPT_ID}/gviz/tq?tqx=out:json`;

            fetch(urlLeitura)
            .then(res => res.text())
            .then(data => {
                const jsonString = data.substring(47, data.length - 2);
                const json = JSON.parse(jsonString);
                bancoDadosCompleto = json.table.rows; // Guarda globalmente os dados da nuvem

                // Ativa o botão correspondente ao dia selecionado
                mudarDiaExibido(diaSelecionado);
                document.getElementById('status-nuvem').innerText = "✅ Sincronizado com Google Sheets";
            })
            .catch(err => {
                document.getElementById('status-nuvem').innerText = "❌ Erro ao carregar dados salvos.";
                console.error(err);
            });
        }

        function processarEExibirDados() {
            let dadosFiltrados = { prot: 0, cal: 0, water: 0, refeicoes: [] };

            bancoDadosCompleto.forEach(row => {
                if (!row.c) return;
                const dia = row.c[1] ? row.c[1].v : '';
                const tipo = row.c[2] ? row.c[2].v : '';
                const nome = row.c[3] ? row.c[3].v : '-';
                const prot = row.c[4] ? parseInt(row.c[4].v) || 0 : 0;
                const cal = row.c[5] ? parseInt(row.c[5].v) || 0 : 0;
                const water = row.c[6] ? parseInt(row.c[6].v) || 0 : 0;

                // Filtra as informações apenas para o dia selecionado atualmente na barra
                if (dia === diaSelecionado) {
                    if (tipo === "refeicao") {
                        dadosFiltrados.prot += prot;
                        dadosFiltrados.cal += cal;
                        dadosFiltrados.refeicoes.push({ nome: nome, prot: prot, cal: cal });
                    } else {
                        dadosFiltrados.water += water;
                    }
                }
            });

            // Atualiza o Cabeçalho do Painel
            document.getElementById('nome-dia-titulo').innerText = diaSelecionado;
            document.getElementById('tag-hoje').style.display = diaSelecionado === realDiaHoje ? "block" : "none";

            // Calcula porcentagens e atualiza barras
            const pctProt = Math.min(Math.round((dadosFiltrados.prot / metas.prot) * 100), 100);
            const pctCal = Math.min(Math.round((dadosFiltrados.cal / metas.cal) * 100), 100);
            const pctWater = Math.min(Math.round((dadosFiltrados.water / metas.water) * 100), 100);

            document.getElementById('label-prot').innerText = `${dadosFiltrados.prot}g / ${metas.prot}g (${pctProt}%)`;
            document.getElementById('label-cal').innerText = `${dadosFiltrados.cal} kcal / ${metas.cal} kcal (${pctCal}%)`;
            document.getElementById('label-water').innerText = `${(dadosFiltrados.water / 1000).toFixed(1)}L / 3.0L (${pctWater}%)`;

            document.getElementById('bar-prot').style.width = pctProt + '%';
            document.getElementById('bar-cal').style.width = pctCal + '%';
            document.getElementById('bar-water').style.width = pctWater + '%';

            // Lista as refeições individuais
            const lista = document.getElementById('lista-refeicoes');
            if (dadosFiltrados.refeicoes.length > 0) {
                lista.style.display = 'block';
                lista.innerHTML = '';
                dadosFiltrados.refeicoes.forEach(item => {
                    lista.innerHTML += `<div class="meal-item"><span><b>${item.nome}:</b> ${item.prot}g P | ${item.cal} kcal</span></div>`;
                });
            } else {
                lista.style.display = 'none';
            }
        }

        // --- INTEGRAÇÃO INTELIGENTE COM GEMINI ---
        async function analisarPratoComIA() {
            const arquivoInput = document.getElementById('foto-refeicao');
            const resultadoDiv = document.getElementById('resultado-ia');
            const btn = document.getElementById('btn-analisar');

            if (!arquivoInput.files || arquivoInput.files.length === 0) {
                alert('Por favor, selecione ou tire uma foto primeiro!');
                return;
            }
            if (GEMINI_API_KEY === 'SUA_CHAVE_GEMINI_AQUI') {
                alert('Você precisa colocar sua chave API do Gemini no código!');
                return;
            }

            const arquivo = arquivoInput.files[0];
            resultadoDiv.innerHTML = "⏳ IA analisando a imagem... Aguarde.";
            btn.disabled = true;

            try {
                const reader = new FileReader();
                reader.readAsDataURL(arquivo);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const mimeType = arquivo.type;
                    const urlGemini = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                    
                    const dadosEnvio = {
                        contents: [{
                            parts: [
                                { text: "Analise esta imagem de comida. Estime as proteínas em gramas (apenas o número inteiro) e as calorias em kcal (apenas o número inteiro). Dê um nome curto para o prato. Retorne estritamente um JSON no seguinte formato, sem formatação markdown: {\"nome\": \"Nome do Prato\", \"prot\": 30, \"cal\": 450}" },
                                { inlineData: { mimeType: mimeType, data: base64Data } }
                            ]
                        }]
                    };

                    const resposta = await fetch(urlGemini, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dadosEnvio)
                    });

                    const jsonResposta = await resposta.json();
                    let textoResultado = jsonResposta.candidates[0].content.parts[0].text;
                    textoResultado = textoResultado.replace(/```json/g, '').replace(/
```/g, '').trim();
                    const dadosComida = JSON.parse(textoResultado);

                    resultadoDiv.innerHTML = `
                        <div style="border: 1px solid var(--primary); padding: 10px; border-radius: 10px; background: #fff; margin-top: 10px; font-size: 12px;">
                            <b>Prato:</b> ${dadosComida.nome}<br>
                            <b>Proteínas:</b> ${dadosComida.prot}g<br>
                            <b>Calorias:</b> ${dadosComida.cal} kcal<br>
                            <button class="btn-submit" style="background:#28a745; margin-top:8px; padding:6px;" onclick="salvarRefeicaoIA('${dadosComida.nome}', ${dadosComida.prot}, ${dadosComida.cal})">✅ Confirmar e Salvar em ${diaSelecionado}</button>
                        </div>
                    `;
                    btn.disabled = false;
                };
            } catch (erro) {
                console.error(erro);
                resultadoDiv.innerHTML = "❌ Erro ao analisar imagem.";
                btn.disabled = false;
            }
        }

        function salvarRefeicaoIA(nome, prot, cal) {
            document.getElementById('status-nuvem').innerText = "⏳ Salvando dados da IA no Google Sheets...";
            let itemParaEnviar = { dia: diaSelecionado, tipo: "refeicao", nome: nome, prot: parseInt(prot), cal: parseInt(cal), water: 0 };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(itemParaEnviar)
            })
            .then(() => {
                document.getElementById('resultado-ia').innerHTML = "✅ Salvo com sucesso!";
                setTimeout(carregarDadosNuvem, 1500);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status-nuvem').innerText = "❌ Erro ao salvar dados.";
            });
        }
    </script>
</body>
</html>
